# Continuous Integration for the QR Code Generator.
#
# Two-stage pipeline demonstrating DevOps practice:
#   1. test   — install dependencies and run the pytest suite
#   2. docker — build the Docker image, smoke-test it by running a
#               container and asserting a QR code was generated, then
#               (on pushes to main, when DockerHub secrets are set)
#               push the image to DockerHub
#
# To enable the DockerHub push, add repository secrets:
#   DOCKERHUB_USERNAME — your DockerHub username
#   DOCKERHUB_TOKEN    — a DockerHub access token (Account Settings > Security)
name: CI - Tests and Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  docker:
    name: Build, smoke-test, and push Docker image
    runs-on: ubuntu-latest
    needs: test          # only build the image if the tests pass
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: qr-code-generator-app:ci

      - name: Smoke test - run the container and verify a QR code is generated
        run: |
          docker run --name qr-smoke qr-code-generator-app:ci --url https://www.njit.edu
          docker logs qr-smoke 2>&1 | grep -q "QR code successfully saved" \
            && echo "Smoke test passed: QR code generated inside the container."

      - name: Log in to DockerHub
        if: github.event_name == 'push' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to DockerHub
        if: github.event_name == 'push' && env.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/qr-code-generator-app:latest
